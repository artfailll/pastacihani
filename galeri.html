<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri · Pastacihanı — İstanbul Butik Pasta Koleksiyonu</title>
<meta name="description" content="Pastacihanı pasta koleksiyonu: doğum günü, nişan, söz, düğün, baby shower ve yıldönümü pastaları. Ürün kodu ile ara, beğendiğinin benzerini İstanbul'a sipariş et.">
<link rel="canonical" href="https://pastacihani.com/galeri">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--paper:#FBF6F0;--card:#fff;--ink:#26181C;--rose:#B23A5B;--rose-deep:#7C2540;--gold:#C29A52;--line:#E8DCD4;--muted:#9C8A85}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',-apple-system,sans-serif;color:var(--ink);background:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased}
  img{display:block;max-width:100%}
  a{color:inherit;text-decoration:none}
  .fr{font-family:'Fraunces',Georgia,serif}
  .wrap{max-width:1240px;margin:0 auto;padding:0 28px}
  .eyebrow{font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;color:var(--rose);font-weight:600}
  header.nav{position:sticky;top:0;z-index:30;background:rgba(251,246,240,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .nav-in{display:flex;align-items:center;justify-content:space-between;height:66px}
  .logo{font-family:'Fraunces',serif;font-size:1.55rem;font-weight:600}
  .logo span{color:var(--rose)}
  .wa-btn{background:var(--ink);color:#fff;padding:10px 18px;font-size:.8rem;font-weight:600;transition:background .25s}
  .wa-btn:hover{background:var(--rose)}
  .intro{padding:60px 0 26px;max-width:760px}
  .intro h1{font-family:'Fraunces',serif;font-size:clamp(2.6rem,6vw,4.4rem);font-weight:500;line-height:1;letter-spacing:-.015em;margin:14px 0 16px}
  .intro h1 em{font-style:italic;color:var(--rose)}
  .intro p{font-size:1.06rem;color:#5d4e52;max-width:48ch}
  .searchwrap{display:flex;max-width:480px;margin:30px 0 4px;border-bottom:1.5px solid var(--ink)}
  .searchwrap input{flex:1;border:0;background:transparent;padding:12px 4px;font:inherit;font-size:1rem;outline:none}
  .searchwrap input::placeholder{color:#b3a39d}
  .searchwrap button{border:0;background:transparent;color:var(--rose);font-weight:600;cursor:pointer;padding:0 6px;font-size:.95rem}
  .rule{height:1px;background:var(--line);margin:30px 0 0}
  .sect{padding:40px 0 80px}
  .covers{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .cover{position:relative;aspect-ratio:3/4;overflow:hidden;cursor:pointer;background:#efe0e5}
  .cover img{width:100%;height:100%;object-fit:cover;transition:transform .7s cubic-bezier(.2,.7,.2,1)}
  .cover:hover img{transform:scale(1.06)}
  .cover .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(38,24,28,0) 38%,rgba(38,24,28,.8));display:flex;flex-direction:column;justify-content:flex-end;padding:20px}
  .cover .ov b{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:1.5rem;color:#fff;line-height:1.05}
  .cover .ov span{color:#f1dfe5;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;margin-top:6px}
  .cover .ln{position:absolute;left:20px;bottom:14px;height:2px;width:26px;background:var(--rose);transition:width .4s}
  .cover:hover .ln{width:56px}
  .cover.empty{display:flex;align-items:flex-end;padding:20px;background:linear-gradient(150deg,#f3e3e8,#ead4dc)}
  .cover.empty b{font-family:'Fraunces',serif;font-style:italic;font-size:1.5rem;color:var(--rose-deep)}
  .topbar{display:flex;align-items:baseline;gap:18px;margin-bottom:26px;flex-wrap:wrap}
  .back{border:0;background:none;color:var(--rose-deep);font-weight:600;cursor:pointer;font-size:.86rem;border-bottom:1.5px solid var(--rose)}
  .topbar h2{font-family:'Fraunces',serif;font-weight:500;font-size:2rem}
  .topbar .ct{color:var(--muted);font-size:.85rem}
  .masonry{column-count:4;column-gap:18px}
  .item{break-inside:avoid;margin-bottom:18px;position:relative;cursor:pointer;overflow:hidden;background:#efe0e5}
  .item img{width:100%;height:auto;display:block;transition:transform .6s cubic-bezier(.2,.7,.2,1)}
  .item:hover img{transform:scale(1.05)}
  .item .hov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(38,24,28,0) 50%,rgba(38,24,28,.82));opacity:0;transition:opacity .35s;display:flex;flex-direction:column;justify-content:flex-end;padding:16px}
  .item:hover .hov{opacity:1}
  .item .hov .d{color:#fff;font-size:.86rem;line-height:1.35}
  .item .hov .o{color:var(--rose);font-weight:600;font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;margin-top:8px}
  .item .code{position:absolute;top:12px;left:12px;background:rgba(251,246,240,.94);color:var(--rose-deep);font-size:.68rem;font-weight:700;letter-spacing:.04em;padding:4px 9px}
  .item .star{position:absolute;top:12px;right:12px;color:var(--gold);font-size:1rem;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
  .state{text-align:center;color:var(--muted);padding:70px 16px}
  .lb{position:fixed;inset:0;background:rgba(28,16,20,.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:60;padding:28px}
  .lb.show{display:flex}
  .lb img{max-width:100%;max-height:62vh;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .lb .code{color:var(--gold);font-size:.76rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-top:18px}
  .lb .cap{color:#f4ebee;margin:8px 20px 0;text-align:center;max-width:560px;font-family:'Fraunces',serif;font-size:1.2rem;font-style:italic}
  .lb .wa{margin-top:20px;background:#25D366;color:#fff;padding:13px 26px;font-weight:700;display:inline-flex;gap:9px;align-items:center}
  .lb .x{position:absolute;top:22px;right:26px;color:#fff;font-size:30px;cursor:pointer;line-height:1;opacity:.8}
  .lb .x:hover{opacity:1}
  .reveal{opacity:1;transform:none}
  .reveal.in{opacity:1;transform:none}
  @media(max-width:1000px){.covers{grid-template-columns:repeat(3,1fr)}.masonry{column-count:3}}
  @media(max-width:680px){.covers{grid-template-columns:repeat(2,1fr);gap:12px}.masonry{column-count:2;column-gap:12px}.item{margin-bottom:12px}.intro{padding:40px 0 20px}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}.reveal{opacity:1;transform:none}}
</style>
</head>
<body>
<header class="nav"><div class="wrap nav-in">
  <a href="/" class="logo">Pasta<span>cihanı</span></a>
  <a class="wa-btn" href="https://wa.me/905548106301" target="_blank" rel="noopener">WhatsApp Sipariş</a>
</div></header>

<div class="wrap"><div class="intro">
  <span class="eyebrow">Koleksiyon · İstanbul</span>
  <h1 class="fr">Her özel an için <em>bir pasta.</em></h1>
  <p>Doğum gününden düğüne, beğendiğin tasarımı seç ya da ürün koduyla ara — benzerini İstanbul'un her yerine ulaştıralım.</p>
  <div class="searchwrap">
    <input id="q" placeholder="Ürün kodu veya isimle ara — örn. DG-001" autocomplete="off">
    <button id="qbtn">Ara →</button>
  </div>
</div><div class="rule"></div></div>

<div class="wrap sect"><div id="view"></div><div class="state" id="state" style="display:none">Yükleniyor…</div></div>

<div class="lb" id="lb">
  <span class="x" onclick="closeLb()">×</span>
  <img id="lbimg" src="" alt="">
  <div class="code" id="lbcode" style="display:none"></div>
  <div class="cap fr" id="lbcap"></div>
  <a class="wa" id="lbwa" href="#" target="_blank" rel="noopener">Benzerini Sipariş Et 🎂</a>
</div>

<script>
const CLOUD_NAME="do7gjdvb0";const WA="https://wa.me/905548106301";
const CATS=[["dogumgunu","Doğum Günü"],["nisan","Nişan"],["soz","Söz"],["dugun","Düğün"],["babyshower","Baby Shower"],["yildonumu","Yıldönümü"],["diger","Diğer"]];
const NAME=Object.fromEntries(CATS);const $=id=>document.getElementById(id);
function hexDecode(h){try{return new TextDecoder().decode(new Uint8Array(h.match(/.{1,2}/g).map(x=>parseInt(x,16))));}catch(e){return"";}}
function parseMeta(pid){const s=pid.split('/').pop();if(!s.startsWith('gd_'))return{code:"",desc:""};const b=s.slice(3).split('-')[0].split('x');return{code:(b[0]&&/^[0-9a-f]+$/i.test(b[0]))?hexDecode(b[0]):"",desc:(b[1]&&/^[0-9a-f]+$/i.test(b[1]))?hexDecode(b[1]):""};}
function norm(c){return(c||'').toLowerCase().replace(/[^a-z0-9]/g,'');}
function imgUrl(r,w){return `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/f_auto,q_auto,w_${w}/v${r.version}/${r.public_id}.${r.format}`;}
function coverUrl(r,w){return `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/f_auto,q_auto,w_${w},c_fill,ar_3:4/v${r.version}/${r.public_id}.${r.format}`;}
function bigUrl(r){return `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/f_auto,q_auto,w_1300/v${r.version}/${r.public_id}.${r.format}`;}
async function fetchTag(slug){try{const res=await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${slug}.json?ts=`+Date.now());if(!res.ok)return[];const d=await res.json();return(d.resources||[]).sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));}catch(e){return[];}}
function obs(){try{document.querySelectorAll('.reveal').forEach(el=>el.classList.add('in'));}catch(e){}}
async function showHub(){
  history.replaceState({},"","?");$('q').value='';
  $('state').style.display='block';$('state').textContent='Yükleniyor…';$('view').innerHTML='';
  const lists=await Promise.all(CATS.map(([s])=>fetchTag(s)));$('state').style.display='none';
  const w=document.createElement('div');w.className='covers';
  CATS.forEach(([slug,ad],i)=>{const items=lists[i];const c=document.createElement('div');c.className='reveal';
    if(items.length){c.classList.add('cover');c.innerHTML=`<img src="${coverUrl(items[0],500)}" alt="${ad}"><div class="ov"><b>${ad}</b><span>${items.length} tasarım</span></div><span class="ln"></span>`;}
    else{c.classList.add('cover','empty');c.innerHTML=`<b>${ad}</b>`;}
    c.onclick=()=>showCat(slug);w.appendChild(c);});
  $('view').appendChild(w);obs();
}
function renderItems(items,pinSet,title,count){
  const top=document.createElement('div');top.className='topbar';
  top.innerHTML=`<button class="back">← Tüm kategoriler</button><h2 class="fr">${title}</h2><span class="ct">${count} tasarım</span>`;
  top.querySelector('.back').onclick=showHub;$('view').appendChild(top);
  if(!items.length){const s=document.createElement('div');s.className='state';s.textContent='Sonuç bulunamadı.';$('view').appendChild(s);return;}
  const m=document.createElement('div');m.className='masonry';
  items.forEach(r=>{const {code,desc}=parseMeta(r.public_id);const pinned=pinSet&&pinSet.has(r.public_id);
    const d=document.createElement('div');d.className='item reveal';
    d.innerHTML=`<img loading="lazy" src="${imgUrl(r,560)}" alt="${desc||'Pastacihanı pasta'}">${code?`<span class="code">${code}</span>`:''}${pinned?`<span class="star">★</span>`:''}<div class="hov">${desc?`<div class="d">${desc}</div>`:''}<div class="o">Tam ekran · Sipariş →</div></div>`;
    d.onclick=()=>openLb(r,code,desc);m.appendChild(d);});
  $('view').appendChild(m);obs();
}
async function showCat(slug){
  history.pushState({slug},"","?kat="+slug);
  $('state').style.display='block';$('state').textContent='Yükleniyor…';$('view').innerHTML='';
  const [items,featured]=await Promise.all([fetchTag(slug),fetchTag('one')]);
  const pin=new Set(featured.map(r=>r.public_id));
  items.sort((a,b)=>{const pa=pin.has(a.public_id)?1:0,pb=pin.has(b.public_id)?1:0;if(pa!==pb)return pb-pa;return(b.created_at||'').localeCompare(a.created_at||'');});
  $('state').style.display='none';renderItems(items,pin,NAME[slug]||'Galeri',items.length);
}
async function doSearch(){
  const q=$('q').value.trim();const n=norm(q);if(!n){showHub();return;}
  history.pushState({q},"","?ara="+encodeURIComponent(q));
  $('state').style.display='block';$('state').textContent='Aranıyor…';$('view').innerHTML='';
  const [byTag,all]=await Promise.all([fetchTag(n),fetchTag('galeri')]);
  const map=new Map();byTag.forEach(r=>map.set(r.public_id,r));
  all.forEach(r=>{const {code,desc}=parseMeta(r.public_id);if(norm(code+desc).includes(n)||(code+' '+desc).toLowerCase().includes(q.toLowerCase()))map.set(r.public_id,r);});
  $('state').style.display='none';renderItems([...map.values()],null,`“${q}”`,map.size);
}
function openLb(r,code,desc){
  $('lbimg').src=bigUrl(r);
  const lc=$('lbcode');if(code){lc.style.display='block';lc.textContent='Ürün Kodu — '+code;}else lc.style.display='none';
  $('lbcap').textContent=desc||'';
  const m=`Merhaba Pastacihanı, ${code?'kod '+code+' ':''}${desc?'("'+desc+'") ':''}pastanın benzerini sipariş etmek istiyorum 🎂`;
  $('lbwa').href=WA+'?text='+encodeURIComponent(m);$('lb').classList.add('show');
}
function closeLb(){$('lb').classList.remove('show');}
$('lb').onclick=e=>{if(e.target.id==='lb')closeLb();};
$('qbtn').onclick=doSearch;$('q').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
window.onpopstate=()=>{const p=new URLSearchParams(location.search),k=p.get('kat'),a=p.get('ara');if(a){$('q').value=a;doSearch();}else if(k)showCat(k);else showHub();};
const p0=new URLSearchParams(location.search);
if(p0.get('ara')){$('q').value=p0.get('ara');doSearch();}else if(p0.get('kat'))showCat(p0.get('kat'));else showHub();
</script>
</body>
</html>
