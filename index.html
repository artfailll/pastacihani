n    { slug: \"babyshower\", label: \"Baby Shower\" },\n    { slug: \"yildonumu\",  label: \"Yıldönümü\" }\n  ];\n\n  var n = CATS.length, ang = 360 \u002F n;\n\n  function coverUrl(r) {\n    return \"https:\u002F\u002Fres.cloudinary.com\u002F\" + CLOUD + \"\u002Fimage\u002Fupload\u002Ff_auto,q_auto,w_420,c_fill,ar_4:5\u002Fv\" + r.version + \"\u002F\" + r.public_id + \".\" + r.format;\n  }\n\n  function layout() {\n    var cards = ring.querySelectorAll(\".hero-card\");\n    if (!cards.length) return;\n    \u002F\u002F 1.05 → kartlar birbirine yakın, dramatik coverflow görünümü\n    var r = Math.round((cards[0].offsetWidth || 190) * 1.05);\n    cards.forEach(function (c, i) {\n      c.style.transform = \"translate(-50%,-50%) rotateY(\" + (i * ang) + \"deg) translateZ(\" + r + \"px)\";\n    });\n  }\n\n  function addCard(cat, imgSrc) {\n    var c = document.createElement(\"a\");\n    c.className = \"hero-card\";\n    c.href = \"\u002Fgaleri?kat=\" + cat.slug;\n    c.setAttribute(\"aria-label\", cat.label + \" pastalarını gör\");\n    if (imgSrc) {\n      var img = document.createElement(\"img\");\n      img.decoding = \"async\";\n      img.alt = cat.label + \" pasta tasarımı\";\n      img.src = imgSrc;\n      c.appendChild(img);\n    }\n    var lbl = document.createElement(\"span\");\n    lbl.className = \"hero-card-label\";\n    lbl.innerHTML = cat.label.replace(\u002F[<>&]\u002Fg, \"\") + '<span class=\"gör\">Galeride Gör →<\u002Fspan>';\n    c.appendChild(lbl);\n    ring.appendChild(c);\n  }\n\n  Promise.all(CATS.map(function (cat) {\n    return fetch(\"https:\u002F\u002Fres.cloudinary.com\u002F\" + CLOUD + \"\u002Fimage\u002Flist\u002F\" + cat.slug + \".json?ts=\" + Date.now())\n      .then(function (res) { return res.ok ? res.json() : { resources: [] }; })\n      .then(function (d) { return { cat: cat, res: (d.resources || [])[0] || null }; })\n      .catch(function () { return { cat: cat, res: null }; });\n  })).then(function (results) {\n    results.forEach(function (item) {\n      addCard(item.cat, item.res ? coverUrl(item.res) : \"\");\n    });\n    layout();\n    window.addEventListener(\"resize\", layout);\n  });\n})();\n\n\u002F* HERO arka plan — süzülen serpme\u002Fşeker taneleri (zarif, yavaş) *\u002F\n(function () {\n  var fx = document.getElementById(\"heroFx\");\n  if (!fx || fx.querySelector(\".p\")) return;\n  if (window.matchMedia && window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches) return;\n  var colors = [\"#B0697F\", \"#C2A062\", \"#8E3B57\", \"#DcC79A\"];\n  var N = window.innerWidth < 600 ? 14 : 22;\n  for (var i = 0; i < N; i++) {\n    var p = document.createElement(\"span\");\n    var isSprinkle = Math.random() > 0.42;\n    p.className = \"p \" + (isSprinkle ? \"sprinkle\" : \"dot\");\n    var c = colors[i % colors.length];\n    p.style.left = (Math.random() * 100).toFixed(2) + \"%\";\n    p.style.background = c;\n    var dur = 13 + Math.random() * 15;\n    p.style.animation = \"heroFloatUp \" + dur.toFixed(1) + \"s linear \" + (-Math.random() * dur).toFixed(1) + \"s infinite\";\n    p.style.setProperty(\"--r\", (Math.random() * 360 - 180).toFixed(0) + \"deg\");\n    p.style.setProperty(\"--o\", (0.22 + Math.random() * 0.4).toFixed(2));\n    if (isSprinkle) {\n      p.style.transform = \"rotate(\" + (Math.random() * 180).toFixed(0) + \"deg)\";\n    } else {\n      var s = (4 + Math.random() * 9).toFixed(0);\n      p.style.width = s + \"px\"; p.style.height = s + \"px\";\n    }\n    fx.appendChild(p);\n  }\n})();\n\n\u002F* ============================================================\n   SATIŞ CHATBOT — Netlify OpenAI fonksiyonuna bağlı\n   Sipariş bilgileri toplanır → sahibine WA bildirimi\n   ============================================================ *\u002F\n(function () {\n  var OWNER = \"905548106301\";\n  var launch      = document.getElementById(\"cbLaunch\");\n  var panel       = document.getElementById(\"cbPanel\");\n  var closeB      = document.getElementById(\"cbClose\");\n  var body        = document.getElementById(\"cbBody\");\n  var form        = document.getElementById(\"cbForm\");\n  var input       = document.getElementById(\"cbInput\");\n  var sendB       = document.getElementById(\"cbSend\");\n  var quick       = document.getElementById(\"cbQuick\");\n  var teaser      = document.getElementById(\"cbTeaser\");\n  var teaserClose = document.getElementById(\"cbTeaserClose\");\n  if (!launch || !panel) return;\n\n  var history = [], greeted = false, busy = false, teaserDone = false, orderSent = false;\n\n  \u002F* ---- yardımcılar ---- *\u002F\n  function esc(s) {\n    return String(s).replace(\u002F[&<>\"]\u002Fg, function(c){ return{\"&\":\"&amp;\",\"<\":\"&lt;\",\">\":\"&gt;\",'\"':\"&quot;\"}[c]; });\n  }\n  function linkify(s) {\n    return esc(s).replace(\u002F(https?:\\\u002F\\\u002F[^\\s<)]+)\u002Fg, function(u){\n      return '<a href=\"'+u+'\" target=\"_blank\" rel=\"noopener\">'+u.replace(\u002F^https?:\\\u002F\\\u002F\u002F,\"\")+\"<\u002Fa>\";\n    });\n  }\n  function scrollDown() { body.scrollTop = body.scrollHeight; }\n\n  function addMsg(role, text) {\n    var el = document.createElement(\"div\");\n    el.className = \"cb-msg \" + (role === \"user\" ? \"user\" : \"bot\");\n    el.innerHTML = linkify(text);\n    body.appendChild(el); scrollDown();\n    return el;\n  }\n  function showTyping() {\n    var t = document.createElement(\"div\");\n    t.className = \"cb-typing\"; t.id = \"cbTyping\";\n    t.innerHTML = \"<i><\u002Fi><i><\u002Fi><i><\u002Fi>\";\n    body.appendChild(t); scrollDown();\n  }\n  function hideTyping() { var t = document.getElementById(\"cbTyping\"); if(t) t.remove(); }\n\n  \u002F* ---- sipariş kartı ---- *\u002F\n  function normalizePhone(p) {\n    var d = String(p).replace(\u002F[^\\d]\u002Fg,\"\");\n    if (d.startsWith(\"90\")) return d;\n    if (d.startsWith(\"0\"))  return \"90\" + d.slice(1);\n    if (d.length === 10)    return \"90\" + d;\n    return d;\n  }\n\n  function buildOwnerMsg(o) {\n    var lines = [\n      \"🎂 YENİ SİPARİŞ — Pastacihanı\",\n      \"━━━━━━━━━━━━━━\",\n      \"Ad: \" + o.name,\n      \"WA: \" + o.phone,\n      \"Pasta: \" + o.type,\n      \"Tarih: \" + o.date,\n      \"Kişi: \" + o.people,\n      o.notes    ? \"Özel: \" + o.notes       : \"\",\n      o.delivery ? \"Teslimat: \" + o.delivery : \"\",\n    ].filter(Boolean).join(\"\\n\");\n    return \"https:\u002F\u002Fwa.me\u002F\" + OWNER + \"?text=\" + encodeURIComponent(lines);\n  }\n\n  function showOrderCard(order) {\n    if (orderSent) return;\n    orderSent = true;\n\n    var ownerUrl = buildOwnerMsg(order);\n\n    var card = document.createElement(\"div\");\n    card.className = \"cb-order-card\";\n    card.innerHTML = [\n      '<div class=\"cb-oc-head\">✅ Siparişiniz Alındı!<\u002Fdiv>',\n      '<p style=\"font-size:.88rem;color:var(--ink-soft);margin-bottom:14px;line-height:1.5\">',\n      'Teşekkürler <b>' + esc(order.name) + '<\u002Fb>! Siparişinizi aldık. 🎂<br>',\n      'En kısa sürede <b>' + esc(order.phone) + '<\u002Fb> numaranızdan WhatsApp\\'tan ulaşacağız.',\n      '<\u002Fp>',\n      '<a class=\"cb-oc-btn primary\" href=\"' + ownerUrl + '\" target=\"_blank\" rel=\"noopener\">',\n      '  📲 Doğrudan WhatsApp\\'tan Yazın →',\n      '<\u002Fa>',\n      '<p class=\"cb-oc-note\">Hızlı yanıt için WhatsApp\\'a yazabilirsiniz.<\u002Fp>'\n    ].join(\"\");\n    body.appendChild(card); scrollDown();\n\n    \u002F\u002F input'u kapat — sipariş tamamlandı\n    form.style.display = \"none\";\n    quick.innerHTML = \"\";\n    var restart = document.createElement(\"button\");\n    restart.type = \"button\"; restart.setAttribute(\"data-q\",\"Yeni sipariş başlatmak istiyorum\");\n    restart.textContent = \"↺ Yeni sipariş\";\n    quick.appendChild(restart);\n  }\n\n  \u002F* ---- ORDER_READY ayrıştır ---- *\u002F\n  function parseOrder(reply) {\n    var match = reply.match(\u002F\\[ORDER_READY\\](\\{[\\s\\S]*?\\})\u002F);\n    if (!match) return null;\n    try { return JSON.parse(match[1]); } catch(e) { return null; }\n  }\n  function stripOrderTag(reply) {\n    return reply.replace(\u002F\\[ORDER_READY\\]\\{[\\s\\S]*?\\}\u002F, \"\").trim();\n  }\n\n  \u002F* ---- SHOW_GALLERY: chat içi galeri kartı ---- *\u002F\n  var CLOUD = \"do7gjdvb0\";\n  var CAT_LABELS = { dogumgunu:\"Doğum Günü\", nisan:\"Nişan\", soz:\"Söz\", dugun:\"Düğün\", babyshower:\"Baby Shower\", yildonumu:\"Yıldönümü\" };\n  var shownSlugs = {};\n\n  function parseGallery(reply) {\n    var m = reply.match(\u002F\\[SHOW_GALLERY:([a-z]+)\\]\u002F);\n    return m ? m[1] : null;\n  }\n  function stripGalleryTag(reply) {\n    return reply.replace(\u002F\\[SHOW_GALLERY:[a-z]+\\]\u002F, \"\").trim();\n  }\n\n  function cldThumbChat(r) {\n    return \"https:\u002F\u002Fres.cloudinary.com\u002F\" + CLOUD + \"\u002Fimage\u002Fupload\u002Ff_auto,q_auto,w_220,c_fill,ar_1:1\u002Fv\" + r.version + \"\u002F\" + r.public_id + \".\" + r.format;\n  }\n  function cldBigChat(r) {\n    return \"https:\u002F\u002Fres.cloudinary.com\u002F\" + CLOUD + \"\u002Fimage\u002Fupload\u002Ff_auto,q_auto,w_1300\u002Fv\" + r.version + \"\u002F\" + r.public_id + \".\" + r.format;\n  }\n\n  function showChatGallery(slug) {\n    if (shownSlugs[slug]) return;\n    shownSlugs[slug] = true;\n\n    var label = CAT_LABELS[slug] || slug;\n    var wrap = document.createElement(\"div\");\n    wrap.className = \"cb-gallery-wrap\";\n    \u002F\u002F iskelet\n    wrap.innerHTML = '<div class=\"cb-gallery-label\">' + esc(label) + ' örnekleri<\u002Fdiv><div class=\"cb-gallery-grid\" id=\"cbg_' + slug + '\">' +\n      '<div class=\"cb-gal-skel\"><\u002Fdiv><div class=\"cb-gal-skel\"><\u002Fdiv><div class=\"cb-gal-skel\"><\u002Fdiv><div class=\"cb-gal-skel\"><\u002Fdiv>' +\n      '<\u002Fdiv><a class=\"cb-gallery-more\" href=\"\u002Fgaleri?kat=' + slug + '\" target=\"_blank\" rel=\"noopener\">Tümünü gör →<\u002Fa>';\n    body.appendChild(wrap);\n    scrollDown();\n\n    fetch(\"https:\u002F\u002Fres.cloudinary.com\u002F\" + CLOUD + \"\u002Fimage\u002Flist\u002F\" + slug + \".json?ts=\" + Date.now())\n      .then(function(r){ return r.ok ? r.json() : { resources:[] }; })\n      .then(function(d){\n        var pics = (d.resources || []).sort(function(a,b){ return (b.created_at||\"\").localeCompare(a.created_at||\"\"); }).slice(0, 4);\n        var grid = document.getElementById(\"cbg_\" + slug);\n        if (!grid || !pics.length) return;\n        var lbItems = pics.map(function(r){ return { img: cldBigChat(r), title: label }; });\n        grid.innerHTML = \"\";\n        pics.forEach(function(r, i){\n          var btn = document.createElement(\"button\");\n          btn.type = \"button\"; btn.className = \"cb-gal-cell\";\n          btn.innerHTML = '<img loading=\"lazy\" decoding=\"async\" alt=\"' + esc(label) + '\" src=\"' + cldThumbChat(r) + '\">';\n          btn.addEventListener(\"click\", function(){\n            if (window.PC && PC.openLightbox) PC.openLightbox(lbItems, i);\n          });\n          grid.appendChild(btn);\n        });\n        scrollDown();\n      })\n      .catch(function(){ \u002F* sessizce geç *\u002F });\n  }\n\n  \u002F* ---- panel aç\u002Fkapat ---- *\u002F\n  function openPanel() {\n    panel.classList.add(\"open\");\n    launch.classList.add(\"hide\");\n    hideTeaser();\n    setTimeout(function(){ input.focus(); }, 350);\n    if (!greeted) {\n      greeted = true;\n      addMsg(\"bot\", \"Merhaba! 🎂 Ben Pastacihanı Sipariş Asistanı. Hangi özel gün için pasta düşünüyorsunuz?\\nAdınızı ve pasta fikrinizi söyleyin, gerisi bende!\");\n    }\n  }\n  function closePanel() { panel.classList.remove(\"open\"); launch.classList.remove(\"hide\"); }\n  function hideTeaser() { if(teaser) teaser.classList.remove(\"show\"); teaserDone = true; }\n\n  launch.addEventListener(\"click\", openPanel);\n  closeB.addEventListener(\"click\", closePanel);\n  if(teaserClose) teaserClose.addEventListener(\"click\", function(e){ e.stopPropagation(); hideTeaser(); });\n  if(teaser) teaser.addEventListener(\"click\", function(e){ if(e.target!==teaserClose) openPanel(); });\n\n  setTimeout(function(){ if(!teaserDone && !panel.classList.contains(\"open\")) teaser && teaser.classList.add(\"show\"); }, 7000);\n\n  quick.addEventListener(\"click\", function(e){\n    var b = e.target.closest(\"button[data-q]\"); if(!b) return;\n    send(b.getAttribute(\"data-q\"));\n  });\n  form.addEventListener(\"submit\", function(e){ e.preventDefault(); send(input.value); });\n\n  \u002F* ---- mesaj gönder ---- *\u002F\n  function send(text) {\n    text = (text||\"\").trim();\n    if (!text || busy) return;\n    input.value = \"\";\n    addMsg(\"user\", text);\n    history.push({ role:\"user\", content:text });\n    busy = true; sendB.disabled = true;\n    showTyping();\n\n    fetch(\"\u002F.netlify\u002Ffunctions\u002Fchat\", {\n      method: \"POST\",\n      headers: { \"Content-Type\":\"application\u002Fjson\" },\n      body: JSON.stringify({ messages: history })\n    })\n    .then(function(r){ if(!r.ok) throw new Error(\"fn \"+r.status); return r.json(); })\n    .then(function(d){\n      hideTyping();\n      var raw = d && d.reply;\n      if (!raw) throw new Error(\"empty\");\n\n      var order   = parseOrder(raw);\n      var galSlug = parseGallery(raw);\n\n      \u002F\u002F temizlenmiş gösterim metni\n      var display = raw;\n      if (order)   display = stripOrderTag(display);\n      if (galSlug) display = stripGalleryTag(display);\n      display = display.trim();\n\n      if (display) addMsg(\"bot\", display);\n      history.push({ role:\"assistant\", content: raw });\n\n      if (galSlug) showChatGallery(galSlug);\n      if (order)   showOrderCard(order);\n    })\n    .catch(function(){\n      hideTyping();\n      addMsg(\"bot\", \"Şu an asistana ulaşamadım 😊 Direkt sipariş için: https:\u002F\u002Fwa.me\u002F\"+OWNER+\" 🎂\");\n    })\n    .then(function(){ busy = false; sendB.disabled = false; if(!orderSent) input.focus(); });\n  }\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
